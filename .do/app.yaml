name: dnuke-com
static_sites:
  - name: dnuke-com
    github:
      repo: YOUR_GITHUB_USERNAME/dnuke.com
      branch: main
      deploy_on_push: true
    build_command: git submodule update --init --recursive && npm run build && cp -r threequencer _site/threequencer
    output_dir: _site
    environment_slug: node-js
    routes:
      - path: /
